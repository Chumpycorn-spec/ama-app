name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow "rembg[cpu]" pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed amazon_gui.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: amazon-tool-exe
          path: dist/*.exe